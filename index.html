<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Utkrisht Playground</title>
    <link rel="icon" href="./website/assets/icon.png" type="image/png">

    <link rel="manifest" href="./website/manifest.json">
    <meta name="theme-color" content="#1A1A1A">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="./website/styles/reset.css">
    <link rel="stylesheet" href="./website/styles/style.css">

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>
    <script src="./website/scripts/mode-utkrisht.js" defer></script>
    <script src="./website/scripts/script.js" defer type="module"></script>

</head>

<body>

    <div class="left" data-left>
        <div class="ribbon">
            <div class="examples">
                <!-- <div>
                    <img src="./assets/folder.svg" height="20px" width="20px" alt="examples" >
                </div> -->
                <select name="examples" data-examples>
                    <option value="prime-finder" selected>Prime Finder</option>
                    <option value="fibonacci">Fibonacci</option>
                    <option value="merge-sort">Merge Sort</option>
                </select>
            </div>
            <div class="actions">
                <button class="reference">
                    <img src="./website/assets/reference.svg" alt="reference" height="20px" width="20px">
                </button>

                <button class="play">
                    <img src="./website/assets/play4.svg" alt="play" height="20px" width="20px">
                </button>

                <button data-settings class="settings">
                    <img src="./website/assets/settings.svg" alt="settings" height="20px" width="20px">
                </button>
            </div>
        </div>

        <!-- Ace Editor -->
        <div id="editor"></div>

        <div class="shortcut-buttons" data-shortcut-buttons data-is-visible="no">
            <button class="shortcut-toggle" data-shortcut-buttons-toggler>
                <img src="./website/assets/arrow-down-2.svg" alt="close shortcut buttons">
            </button>

            <div class="up">
                <button>
                    <img src="./website/assets/tab.svg" alt="tab" height="20px" width="20px">
                </button>

                <button>
                    <img src="./website/assets/undo.svg" alt="undo" height="20px" width="20px">
                </button>

                <button>
                    <img src="./website/assets/redo.svg" alt="redo" height="20px" width="20px">
                </button>

                <button>
                    <img src="./website/assets/search.svg" alt="search" height="20px" width="20px">
                </button>

                <button>
                    <img src="./website/assets/arrow-up.svg" alt="up arrow" height="20px" width="20px">
                </button>

                <button>
                    <img src="./website/assets/more2.svg" alt="more" height="20px" width="20px">
                </button>
            </div>

            <div class="down">
                <button>CTRL</button>
                <button>SHFT</button>
                <button>ALT</button>
                <button>
                    <img src="./website/assets/arrow-left.svg" alt="left arrow" height="20px" width="20px">
                </button>
                <button>
                    <img src="./website/assets/arrow-down.svg" alt="down arrow" height="20px" width="20px">
                </button>
                <button>
                    <img src="./website/assets/arrow-right.svg" alt="right arrow" height="20px" width="20px">
                </button>
            </div>
        </div>
    </div>

    <div class="right markdown" data-right></div>




    <!-- 
     - Ace Editor Settings
     -->
    <div data-settings-overlay class="overlay" style="display: none;"></div>
    <div data-settings-menu class="settings-menu" style="display: none;">

        <div class="entries">

            <div class="entry">
                <div>Theme</div>
                <select data-settings-theme name="theme">
                    <optgroup label="Dark">
                        <option value="ace/theme/ambiance">Ambiance</option>
                        <option value="ace/theme/chaos">Chaos</option>
                        <option value="ace/theme/clouds_midnight">Clouds Midnight</option>
                        <option value="ace/theme/dracula" selected>Dracula</option>
                        <option value="ace/theme/cobalt">Cobalt</option>
                        <option value="ace/theme/gruvbox">Gruvbox</option>
                        <option value="ace/theme/gob">Green on Black</option>
                        <option value="ace/theme/idle_fingers">idle Fingers</option>
                        <option value="ace/theme/kr_theme">krTheme</option>
                        <option value="ace/theme/merbivore">Merbivore</option>
                        <option value="ace/theme/merbivore_soft">Merbivore Soft</option>
                        <option value="ace/theme/mono_industrial">Mono Industrial</option>
                        <option value="ace/theme/monokai">Monokai</option>
                        <option value="ace/theme/nord_dark">Nord Dark</option>
                        <option value="ace/theme/one_dark">One Dark</option>
                        <option value="ace/theme/pastel_on_dark">Pastel on dark</option>
                        <option value="ace/theme/solarized_dark">Solarized Dark</option>
                        <option value="ace/theme/terminal">Terminal</option>
                        <option value="ace/theme/tomorrow_night">Tomorrow Night</option>
                        <option value="ace/theme/tomorrow_night_blue">Tomorrow Night Blue</option>
                        <option value="ace/theme/tomorrow_night_bright">Tomorrow Night Bright</option>
                        <option value="ace/theme/tomorrow_night_eighties">Tomorrow Night 80s</option>
                        <option value="ace/theme/twilight">Twilight</option>
                        <option value="ace/theme/vibrant_ink">Vibrant Ink</option>
                        <option value="ace/theme/github_dark">GitHub Dark</option>
                        <option value="ace/theme/cloud_editor_dark">CloudEditor Dark</option>
                    </optgroup>
                    <optgroup label="Light">
                        <option value="ace/theme/chrome">Chrome</option>
                        <option value="ace/theme/clouds">Clouds</option>
                        <option value="ace/theme/crimson_editor">Crimson Editor</option>
                        <option value="ace/theme/dawn">Dawn</option>
                        <option value="ace/theme/dreamweaver">Dreamweaver</option>
                        <option value="ace/theme/eclipse">Eclipse</option>
                        <option value="ace/theme/github_light_default">GitHub Light Default</option>
                        <option value="ace/theme/github">GitHub (Legacy)</option>
                        <option value="ace/theme/iplastic">IPlastic</option>
                        <option value="ace/theme/solarized_light">Solarized Light</option>
                        <option value="ace/theme/textmate">TextMate</option>
                        <option value="ace/theme/tomorrow">Tomorrow</option>
                        <option value="ace/theme/xcode">XCode</option>
                        <option value="ace/theme/kuroir">Kuroir</option>
                        <option value="ace/theme/katzenmilch">KatzenMilch</option>
                        <option value="ace/theme/sqlserver">SQL Server</option>
                        <option value="ace/theme/cloud_editor">CloudEditor</option>
                    </optgroup>
                </select>
            </div>


            <div class="entry">
                <div>Keybinding</div>
                <div class="keybindings">
                    <button data-settings-keybinding="active" value="null">Ace</button>
                    <button data-settings-keybinding value="ace/keyboard/vscode">VS Code</button>
                    <button data-settings-keybinding value="ace/keyboard/sublime">Sublime</button>
                    <button data-settings-keybinding value="ace/keyboard/vim">Vim</button>
                    <button data-settings-keybinding value="ace/keyboard/emacs">Emacs</button>
                </div>
            </div>

            <div class="entry">
                <div>Font Size</div>
                <div>
                    <input data-settings-font-size type="number" value="16" min="1">
                </div>
            </div>



            <div class="entry">
                <div>Cursor Style</div>
                <select data-settings-cursor-style id="cursor-style">
                    <option value="ace">Ace</option>
                    <option value="slim">Slim</option>
                    <option value="smooth">Smooth</option>
                    <option value="smooth slim">Smooth And Slim</option>
                    <option value="wide">Wide</option>
                </select>
            </div>


            <div class="entry">
                <div>Tab Size</div>
                <div>
                    <input data-settings-tab-size type="number" value="4" min="1">
                </div>
            </div>

            <div class="entry">
                <div>Insert spaces</div>
                <div>
                    <input data-settings-insert-spaces type="checkbox" checked>
                </div>
            </div>

            <div class="entry">
                <div>Show Invisible Characters</div>
                <div>
                    <input data-settings-show-invisible-characters type="checkbox">
                </div>
            </div>

            <div class="entry">
                <div>Keyboard Accessibility Mode</div>
                <div>
                    <input data-settings-keyboard-accessibility-mode type="checkbox">
                </div>
            </div>
        </div>
    </div>
















    <template data-template-result>
        <div class="console">
            <div>Console</div>
            <div class="content">Some Output</div>
        </div>
        <div class="pipeline">
            <div>Pipeline</div>
            <div class="content">Some pipeline</div>
        </div>
    </template>







    <template data-template-reference>

    </template>



    <!-- <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script> -->
</body>

</html>
