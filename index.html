<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utkrisht Playground</title>
    <link rel="icon" href="./website/assets/icon.png" type="image/png">

    <link rel="manifest" href="./website/manifest.json">
    <meta name="theme-color" content="#1A1A1A">

    <!-- Styles -->
    <link rel="stylesheet" href="./website/css/reset.css">
    <link rel="stylesheet" href="./website/css/style.css">

    <!-- Scripts -->
    <!-- <script src="./website/ace/src-min-noconflict/ace.js" defer></script> -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>
    <script src="./website/scripts/mode-utkrisht.js" defer></script>
    <script src="./website/scripts/script.js" defer type="module"></script>

</head>

<body>

    <div class="left">
        <div class="ribbon">
            <div class="examples">
                <!-- <div>
                    <img src="./assets/folder.svg" height="22px" width="22px" alt="examples" >
                </div> -->
                <select name="examples">
                    <option value="prime">Prime Finder</option>
                    <option value="fibonacci">Fibonacci</option>
                    <option value="Bubble Sort">Bubble Sort</option>
                </select>
            </div>
            <div class="actions">
                <div class="reference">
                    <img src="./website/assets/reference.svg" alt="reference" height="22px" width="22px">
                </div>
                <div class="play">
                    <img src="./website/assets/play4.svg" alt="play" height="22px" width="22px">
                </div>
                <div data-settings class="settings">
                    <img src="./website/assets/settings.svg" alt="settings" height="22px" width="22px">
                </div>
            </div>
        </div>

        <!-- Ace Editor -->
        <div id="editor"></div>
    </div>

    <div class="right">

    </div>


    <div data-settings-overlay class="overlay" style="display: none;"></div>
    <div data-settings-menu class="settings-menu" style="display: none;">
        <!-- <h2>Settings</h2> -->
        <div class="entries">

            <div class="entry">
                <div>Theme</div>
                <select name="theme" id="theme">
                    <optgroup label="Dark">
                        <option value="ace/theme/ambiance">Ambiance</option>
                        <option value="ace/theme/chaos">Chaos</option>
                        <option value="ace/theme/clouds_midnight">Clouds Midnight</option>
                        <option value="ace/theme/dracula" selected>Dracula</option>
                        <option value="ace/theme/cobalt">Cobalt</option>
                        <option value="ace/theme/gruvbox">Gruvbox</option>
                        <option value="ace/theme/gob">Green on Black</option>
                        <option value="ace/theme/idle_fingers">idle Fingers</option>
                        <option value="ace/theme/kr_theme">krTheme</option>
                        <option value="ace/theme/merbivore">Merbivore</option>
                        <option value="ace/theme/merbivore_soft">Merbivore Soft</option>
                        <option value="ace/theme/mono_industrial">Mono Industrial</option>
                        <option value="ace/theme/monokai">Monokai</option>
                        <option value="ace/theme/nord_dark">Nord Dark</option>
                        <option value="ace/theme/one_dark">One Dark</option>
                        <option value="ace/theme/pastel_on_dark">Pastel on dark</option>
                        <option value="ace/theme/solarized_dark">Solarized Dark</option>
                        <option value="ace/theme/terminal">Terminal</option>
                        <option value="ace/theme/tomorrow_night">Tomorrow Night</option>
                        <option value="ace/theme/tomorrow_night_blue">Tomorrow Night Blue</option>
                        <option value="ace/theme/tomorrow_night_bright">Tomorrow Night Bright</option>
                        <option value="ace/theme/tomorrow_night_eighties">Tomorrow Night 80s</option>
                        <option value="ace/theme/twilight">Twilight</option>
                        <option value="ace/theme/vibrant_ink">Vibrant Ink</option>
                        <option value="ace/theme/github_dark">GitHub Dark</option>
                        <option value="ace/theme/cloud_editor_dark">CloudEditor Dark</option>
                    </optgroup>
                    <optgroup label="Light">
                        <option value="ace/theme/chrome">Chrome</option>
                        <option value="ace/theme/clouds">Clouds</option>
                        <option value="ace/theme/crimson_editor">Crimson Editor</option>
                        <option value="ace/theme/dawn">Dawn</option>
                        <option value="ace/theme/dreamweaver">Dreamweaver</option>
                        <option value="ace/theme/eclipse">Eclipse</option>
                        <option value="ace/theme/github_light_default">GitHub Light Default</option>
                        <option value="ace/theme/github">GitHub (Legacy)</option>
                        <option value="ace/theme/iplastic">IPlastic</option>
                        <option value="ace/theme/solarized_light">Solarized Light</option>
                        <option value="ace/theme/textmate">TextMate</option>
                        <option value="ace/theme/tomorrow">Tomorrow</option>
                        <option value="ace/theme/xcode">XCode</option>
                        <option value="ace/theme/kuroir">Kuroir</option>
                        <option value="ace/theme/katzenmilch">KatzenMilch</option>
                        <option value="ace/theme/sqlserver">SQL Server</option>
                        <option value="ace/theme/cloud_editor">CloudEditor</option>
                    </optgroup>
                </select>
            </div>


            <div class="entry">
                <div>Keybinding</div>
                <div class="keybindings">
                    <button data-keybinding="active" value="null">Ace</button>
                    <button data-keybinding value="ace/keyboard/vim">Vim</button>
                    <button data-keybinding value="ace/keyboard/emacs">Emacs</button>
                    <button data-keybinding value="ace/keyboard/sublime">Sublime</button>
                    <button data-keybinding value="ace/keyboard/vscode">VSCode</button>
                </div>
            </div>

            <div class="entry">
                <div>Font Size</div>
                <div>
                    <input type="number" value="16">
                </div>
            </div>



            <div class="entry">
                <div>Cursor Style</div>
                <select id="cursor-style">
                    <option value="ace">Ace</option>
                    <option value="slim">Slim</option>
                    <option value="smooth">Smooth</option>
                    <option value="smooth slim">Smooth And Slim</option>
                    <option value="wide">Wide</option>
                </select>
            </div>


            <div class="entry">
                <div>Tab Size</div>
                <div>
                    <input type="number" value="4">
                </div>
            </div>

            <div class="entry">
                <div>Insert spaces</div>
                <div>
                    <input type="checkbox" checked>
                </div>
            </div>

            <div class="entry">
                <div>Show Invisible Characters</div>
                <div>
                    <input type="checkbox">
                </div>
            </div>

            <div class="entry">
                <div>Keyboard Accessibility Mode</div>
                <div>
                    <input type="checkbox">
                </div>
            </div>
        </div>
    </div>
















    <template>
        <div class="console">
            <div>Console</div>
            <div class="content">Some Output</div>
        </div>
        <div class="pipeline">
            <div>Pipeline</div>
            <div class="content">Some pipeline</div>
        </div>
    </template>

    <template>
        <div class="reference">
            Stuff
        </div>
    </template>

</body>

</html>
