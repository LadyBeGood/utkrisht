<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Utkrisht Playground</title>
    <link rel="icon" href="./website/assets/icon.png" type="image/png">

    <link rel="manifest" href="./website/manifest.json">
    <meta name="theme-color" content="#1A1A1A">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="./website/styles/reset.css">
    <link rel="stylesheet" href="./website/styles/style.css">
    <link rel="stylesheet" href="./website/styles/ace.css">
    <link rel="stylesheet" href="./website/styles/markdown.css">
    <link rel="stylesheet" href="./website/styles/prism.css">

    <!-- Scripts -->
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.min.js"></script>
    <script defer src="./website/scripts/prism.js" defer></script>
    <script defer src="./website/scripts/mode-utkrisht.js" defer></script>
    <script defer src="./website/scripts/script.js" defer type="module"></script>

</head>

<body>

    <div class="left" data-left>
        <div class="ribbon">
            <div class="examples">
                <!-- <div>
                    <img src="./assets/folder.svg" height="20px" width="20px" alt="examples" >
                </div> -->
                <select name="examples" data-examples>
                    <option value="prime-finder" selected>Prime Finder</option>
                    <option value="fibonacci">Fibonacci</option>
                    <option value="merge-sort">Merge Sort</option>
                </select>
            </div>
            <div class="actions">
                <button class="documentation">
                    <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px"
                        fill="currentColor">
                        <path

                    </svg>
                </button>

                <button class="play">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M6 19.5425V4.45749C6 4.04453 6.13827 3.69838 6.41481 3.41903C6.69136 3.13968 7.01399 3 7.38272 3C7.49794 3 7.61893 3.01822 7.74568 3.05466C7.87243 3.09109 7.99342 3.14575 8.10864 3.21862L19.3778 10.7611C19.5852 10.9069 19.7407 11.0891 19.8444 11.3077C19.9481 11.5263 20 11.7571 20 12C20 12.2429 19.9481 12.4737 19.8444 12.6923C19.7407 12.9109 19.5852 13.0931 19.3778 13.2389L8.10864 20.7814C7.99342 20.8542 7.87243 20.9089 7.74568 20.9453C7.61893 20.9818 7.49794 21 7.38272 21C7.01399 21 6.69136 20.8603 6.41481 20.581C6.13827 20.3016 6 19.9555 6 19.5425Z"
                            fill="currentColor" />
                    </svg>
                </button>

                <button data-settings class="settings">
                    <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px"
                        fill="currentColor">
                        <path
                            d="M433-80q-27 0-46.5-18T363-142l-9-66q-13-5-24.5-12T307-235l-62 26q-25 11-50 2t-39-32l-47-82q-14-23-8-49t27-43l53-40q-1-7-1-13.5v-27q0-6.5 1-13.5l-53-40q-21-17-27-43t8-49l47-82q14-23 39-32t50 2l62 26q11-8 23-15t24-12l9-66q4-26 23.5-44t46.5-18h94q27 0 46.5 18t23.5 44l9 66q13 5 24.5 12t22.5 15l62-26q25-11 50-2t39 32l47 82q14 23 8 49t-27 43l-53 40q1 7 1 13.5v27q0 6.5-2 13.5l53 40q21 17 27 43t-8 49l-48 82q-14 23-39 32t-50-2l-60-26q-11 8-23 15t-24 12l-9 66q-4 26-23.5 44T527-80h-94Zm49-260q58 0 99-41t41-99q0-58-41-99t-99-41q-59 0-99.5 41T342-480q0 58 40.5 99t99.5 41Z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Ace Editor -->
        <div id="editor"></div>

        <div class="shortcut-buttons" data-shortcut-buttons data-is-visible="false">
            <button class="shortcut-toggle" data-shortcut-buttons-toggler>
                <img src="./website/assets/arrow-down-2.svg" alt="close shortcut buttons">
            </button>

            <div class="up">
                <button data-shortcut-button-tab>
                    <img src="./website/assets/tab.svg" alt="tab" height="20px" width="20px">
                </button>

                <button data-shortcut-button-undo>
                    <img style="transform: rotateZ(-90deg) rotateY(180deg);" src="./website/assets/undo-2.svg" alt="undo" height="20px" width="20px">
                </button>
                
                <button data-shortcut-button-redo>
                    <img style="transform: rotateZ(90deg);" src="./website/assets/undo-2.svg" alt="undo" height="20px" width="20px">
                    <!-- <img src="./website/assets/redo.svg" alt="redo" height="20px" width="20px"> -->
                </button>

                <button data-shortcut-button-search>
                    <img src="./website/assets/search.svg" alt="search" height="20px" width="20px">
                </button>

                <button data-shortcut-button-up>
                    <img src="./website/assets/arrow-up.svg" alt="up arrow" height="20px" width="20px">
                </button>

                <button data-shortcut-button-more>
                    <img src="./website/assets/more2.svg" alt="more" height="20px" width="20px">
                </button>
            </div>

            <div class="down">
                <button data-shortcut-button-control>CTRL</button>
                <button data-shortcut-button-shift>SHFT</button>
                <button data-shortcut-button-alt>ALT</button>
                <button data-shortcut-button-left>
                    <img src="./website/assets/arrow-left.svg" alt="left arrow" height="20px" width="20px">
                </button>
                <button data-shortcut-button-down>
                    <img src="./website/assets/arrow-down.svg" alt="down arrow" height="20px" width="20px">
                </button>
                <button data-shortcut-button-right>
                    <img src="./website/assets/arrow-right.svg" alt="right arrow" height="20px" width="20px">
                </button>
            </div>
        </div>
    </div>

    <div class="right" data-right>

        <div class="screen">
            <div class="display">
                
            </div>

            <div class="panes">
                <button class="pane">
                    <svg xmlns="http://www.w3.org/2000/svg" height="22px" viewBox="0 -960 960 960" width="22px"
                        fill="#e3e3e3">
                        <path
                            d="M607.5-372.5Q660-425 660-500t-52.5-127.5Q555-680 480-680t-127.5 52.5Q300-575 300-500t52.5 127.5Q405-320 480-320t127.5-52.5Zm-204-51Q372-455 372-500t31.5-76.5Q435-608 480-608t76.5 31.5Q588-545 588-500t-31.5 76.5Q525-392 480-392t-76.5-31.5ZM235.5-272Q125-344 61-462q-5-9-7.5-18.5T51-500q0-10 2.5-19.5T61-538q64-118 174.5-190T480-800q134 0 244.5 72T899-538q5 9 7.5 18.5T909-500q0 10-2.5 19.5T899-462q-64 118-174.5 190T480-200q-134 0-244.5-72ZM480-500Zm207.5 160.5Q782-399 832-500q-50-101-144.5-160.5T480-720q-113 0-207.5 59.5T128-500q50 101 144.5 160.5T480-280q113 0 207.5-59.5Z" />
                    </svg>
                </button>

                <button class="pane active">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g clip-path="url(#clip0_138_15)">
                            <path d="M5 5L10 10L5 15M12 17H19" stroke="white" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </g>
                        <defs>
                            <clipPath id="clip0_138_15">
                                <rect width="24" height="24" fill="white" />
                            </clipPath>
                        </defs>
                    </svg>
                </button>

                <button class="pane">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="23" height="23">
                        <path d="M10 9 L7.5 14.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                        <path d="M14 9 L16.5 14.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />

                        <circle cx="12" cy="6" r="3" fill="none" stroke="currentColor" stroke-width="1.6" />

                        <circle cx="6" cy="18" r="3" fill="none" stroke="currentColor" stroke-width="1.6" />

                        <circle cx="18" cy="18" r="3" fill="none" stroke="currentColor" stroke-width="1.6" />
                    </svg>
                </button>

                <button class="pane">
                    JS
                </button>
            </div>
        </div>


        <div class="documentation">

            <div class="sidebar" data-documentation-sidebar data-collapsed="false">
                <div class="search-box">
                    <div class="search-row">
                        <input type="text" class="search-input" data-documentation-search-field placeholder="Search..." autocomplete="off">
                    </div>

                    <div class="search-controls" data-documentation-search-controls style="display: none;">
                        <span class="search-result-count" data-documentation-search-result-count>
                            0/0 results
                        </span>

                        <div class="navigation-arrows">
                            <button data-documentation-search-previous-button class="navigation-button" title="Previous Result">▲</button>
                            <button data-documentation-search-next-button class="navigation-button" title="Next Result">▼</button>
                        </div>
                    </div>
                </div>

                <!-- Topics, hidden automatically during search execution -->
                <ul class="topics" data-topics>
                    <li class="topic open" data-topic>
                        <div class="topic-name" data-topic-name>Language</div>
                        
                        <ul class="sub-topics">
                            <li>
                                <button class="sub-topic active" data-sub-topic data-file-name="language.comments">
                                    Comments
                                </button>
                            </li>

                            <li>
                                <button class="sub-topic" data-sub-topic data-file-name="language.keywords">
                                    Keywords
                                </button>
                            </li>

                            <li>
                                <button class="sub-topic" data-sub-topic data-file-name="language.symbols">
                                    Symbols
                                </button>
                            </li>

                            <li>
                                <button class="sub-topic" data-sub-topic data-file-name="language.identifiers">
                                    Identifiers
                                </button>
                            </li>

                            <li>
                                <button class="sub-topic" data-sub-topic data-file-name="language.data-types">
                                    Data Types
                                </button>
                            </li>

                            <li>
                                <button class="sub-topic" data-sub-topic data-file-name="language.variables">
                                    Variables
                                </button>
                            </li>

                            <li>
                                <button class="sub-topic" data-sub-topic data-file-name="language.conditionals">
                                    Conditionals
                                </button>
                            </li>

                            <li>
                                <button class="sub-topic" data-sub-topic data-file-name="language.loops">
                                    Loops
                                </button>
                            </li>

                            <li>
                                <button class="sub-topic" data-sub-topic data-file-name="language.error-handling">
                                    Error Handling
                                </button>
                            </li>

                            <li>
                                <button class="sub-topic" data-sub-topic data-file-name="language.packages">
                                    Packages
                                </button>
                            </li>
                        </ul>
                    </li>

                    <li class="topic open" data-topic>
                        <div class="topic-name" data-topic-name>Keybindings</div>

                        <ul class="sub-topics">
                            <li>
                                <button class="sub-topic" data-sub-topic data-file-name="keybindings.ace">
                                    Ace
                                </button>
                            </li>

                            <li>
                                <button class="sub-topic" data-sub-topic data-file-name="keybindings.vscode">
                                    VS Code
                                </button>
                            </li>

                            <li>
                                <button class="sub-topic" data-sub-topic data-file-name="keybindings.sublime">
                                    Sublime
                                </button>
                            </li>

                            <li>
                                <button class="sub-topic" data-sub-topic data-file-name="keybindings.vim">
                                    Vim
                                </button>
                            </li>

                            <li>
                                <button class="sub-topic" data-sub-topic data-file-name="keybindings.emacs">
                                    Emacs
                                </button>
                            </li>
                        </ul>
                    </li>
                </ul>

                <!-- Search results -->
                <div class="search-results" data-documentation-search-results style="display: none;"></div>
            </div>

            <!-- Content is dynamically fetched and inserted -->
            <div class="content markdown" data-documentation-content></div>
        </div>

    </div>




    <!-- 
     - Ace Editor Settings
     -->

                    <optgroup label="Light">

            <div class="entry">
                <div>Keybinding</div>
                <div class="keybindings">
                    <button data-settings-keybinding value="null">Ace</button>
                    <button data-settings-keybinding="active" value="ace/keyboard/vscode">VS Code</button>
                    <button data-settings-keybinding value="ace/keyboard/sublime">Sublime</button>
                    <button data-settings-keybinding value="ace/keyboard/vim">Vim</button>
                    <button data-settings-keybinding value="ace/keyboard/emacs">Emacs</button>
                </div>
            </div>

            <div class="entry">
                <div>Font Size</div>
                <div>
                    <input data-settings-font-size type="number" value="16" min="1">
                </div>
            </div>



            <div class="entry">
                <div>Cursor Style</div>
                <select data-settings-cursor-style id="cursor-style">
                    <option value="ace">Ace</option>
                    <option value="slim">Slim</option>
                    <option value="smooth">Smooth</option>
                    <option value="smooth slim">Smooth And Slim</option>
                    <option value="wide" disabled>Wide</option>
                </select>
            </div>


            <div class="entry">
                <div>Tab Size</div>
                <div>
                    <input data-settings-tab-size type="number" value="4" min="1">
                </div>
            </div>

            <div class="entry">
                <div>Insert spaces</div>
                <div>
                    <input data-settings-insert-spaces type="checkbox" checked>
                </div>
            </div>

            <div class="entry">
                <div>Show Invisible Characters</div>
                <div>
                    <input data-settings-show-invisible-characters type="checkbox">
                </div>
            </div>

            <div class="entry">
                <div>Keyboard Accessibility Mode</div>
                <div>
                    <input data-settings-keyboard-accessibility-mode type="checkbox">
                </div>
            </div>
        </div>
    </div>




</body>

</html>
